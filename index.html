<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Misty Horizon Holidays - Premium North East & Himalayan Travel Agency. Explore Sikkim, Darjeeling, Meghalaya, Bhutan, Kashmir and more with custom tours, cab hire, and hotel bookings." />
    <meta name="keywords" content="Darjeeling travel, Sikkim tours, Bhutan packages, North East India, Kashmir travels, Meghalaya tours, Adventure travel, Mountain tourism" />
    <meta property="og:title" content="Misty Horizon Holidays - Premium Travel Agency" />
    <meta property="og:description" content="Explore the magic of the Himalayas with Misty Horizon Holidays" />
    <meta property="og:type" content="website" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Georgia:wght@400;700&family=Segoe+UI:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <title>Misty Horizon Holidays - Premium Travel Agency in Darjeeling</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html {
        scroll-behavior: smooth;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        color: #1a1a1a;
        background: white;
        line-height: 1.6;
      }
      
      /* Swiper Custom Styles */
      .swiper {
        width: 100%;
        height: 100%;
        padding-bottom: 60px;
      }
      
      .swiper-pagination {
        bottom: 0 !important;
      }
      
      .swiper-pagination-bullet {
        background: #7CB8C8;
        opacity: 0.5;
      }
      
      .swiper-pagination-bullet-active {
        opacity: 1;
        background: #3D6B4F;
      }
      
      .swiper-button-next,
      .swiper-button-prev {
        color: #3D6B4F;
      }
      
      /* Smooth Scroll */
      html {
        scroll-behavior: smooth;
      }
      
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }
      
      ::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #7CB8C8;
        border-radius: 5px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #3D6B4F;
      }
      
      /* Selection */
      ::selection {
        background: #F4C46E;
        color: #3D6B4F;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
